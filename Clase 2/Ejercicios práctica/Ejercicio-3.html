<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Como cocinar arroz</title>
</head>
<body>
    <h1>Pasos para cocinar arroz</h1>
    <ol>
        <li>Lava el arroz con agua hasta que salga clara.</li>
        <li>Calienta una olla con un poco de aceite y agrega el arroz.</li>
        <li>Incorpora agua, sal y tapa la olla.</li>
        <li>Cocina a fuego bajo hasta que el agua se absorba.</li>
        <li>Deja reposar unos minutos antes de servir.</li>
    </ol>
</body>
</html>
